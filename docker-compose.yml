version: "3.9"

services:
  soctracker:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://soctracker:soctracker@db:5432/soctracker
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: soctracker
      POSTGRES_PASSWORD: soctracker
      POSTGRES_DB: soctracker
    volumes:
      - soctracker_db:/var/lib/postgresql/data

volumes:
  soctracker_db:
